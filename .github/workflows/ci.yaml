name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dfetch
          POSTGRES_PASSWORD: dfetch
          POSTGRES_DB: dfetch
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test with coverage check
        run: make coverage

      - name: Postgres connector integration tests
        env:
          DFETCH_TEST_POSTGRES_DSN: postgres://dfetch:dfetch@localhost:5432/dfetch?sslmode=disable
        run: go test -tags integration ./internal/source/postgres/

  test-nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: dfetch # TODO ensure this Cachix cache exists before relying on pushes
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          # Fork PRs run without repo secrets, so authToken is empty and pushes
          # are skipped automatically — they still read from the cache. The cache
          # is populated on push to main, where the secret is available.
          skipPush: ${{ github.ref != 'refs/heads/main' }}
      - run: nix build .#

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Prettier (docs / config formatting)
        run: make fmt-check

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  gomod2nix-check:
    # Offline guard (no Nix): fail if gomod2nix.toml drifted from go.mod/go.sum,
    # with a clearer message than test-nix-build's hash error. On Dependabot PRs
    # the gomod2nix autofix workflow regenerates and pushes the lockfile.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: gomod2nix.toml is in sync
        run: make gomod2nix-check

  dependency-review:
    # Only on PRs, and only once the repo is public — dependency review needs the
    # dependency graph, which is free for public repos (GHAS otherwise). While the
    # repo is private this job is skipped (neutral); it auto-enables on going public.
    if: github.event_name == 'pull_request' && github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
