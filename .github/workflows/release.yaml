name: Release

on:
  push:
    tags:
      - "v*"

# Least privilege at the top level; only the publish job escalates to write.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # cgo (mattn/go-sqlite3) can't be cleanly cross-compiled, so build each target
  # on a native runner: ubuntu-latest -> linux/amd64, ubuntu-24.04-arm ->
  # linux/arm64, macos-latest -> darwin/arm64, windows-latest -> windows/amd64.
  # The archive name comes from `go env GOOS/GOARCH` on the runner, so adding an
  # arch is just adding its runner here.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build native target
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: build --single-target --clean

      # Package on the native runner: GOOS/GOARCH are the host's here, so the
      # archive name carries the real platform. (Uploading the bare binary and
      # naming it downstream doesn't work — a single matched file is flattened to
      # its parent on upload, dropping goreleaser's dist/<id>_<os>_<arch>/ dir.)
      - name: Package archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bin=$(find dist -type f -name dfetch | head -1)
          [ -n "$bin" ] || { echo "no dfetch binary in dist/" >&2; exit 1; }
          mkdir -p release
          tar czf "release/dfetch_$(go env GOOS)_$(go env GOARCH).tar.gz" -C "$(dirname "$bin")" dfetch

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Recurse -Path dist -Filter dfetch.exe | Select-Object -First 1
          if (-not $bin) { Write-Error "no dfetch.exe in dist/"; exit 1 }
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path $bin.FullName -DestinationPath "release/dfetch_$(go env GOOS)_$(go env GOARCH).zip"

      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archive-${{ matrix.os }}
          path: release/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Collect archives and checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.txt
          ls -la

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --generate-notes --repo "${GITHUB_REPOSITORY}"
