name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # cgo (mattn/go-sqlite3) can't be cleanly cross-compiled, so build each OS on
  # its native runner. ubuntu-latest -> linux/amd64, macos-latest -> darwin/arm64,
  # windows-latest -> windows/amd64. Additional arches can be added with more
  # runners (e.g. linux/arm64) later.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build native target
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: build --single-target --clean

      # Package on the native runner: GOOS/GOARCH are the host's here, so the
      # archive name carries the real platform. (Uploading the bare binary and
      # naming it downstream doesn't work — a single matched file is flattened to
      # its parent on upload, dropping goreleaser's dist/<id>_<os>_<arch>/ dir.)
      - name: Package archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bin=$(find dist -type f -name dfetch | head -1)
          [ -n "$bin" ] || { echo "no dfetch binary in dist/" >&2; exit 1; }
          mkdir -p release
          tar czf "release/dfetch_$(go env GOOS)_$(go env GOARCH).tar.gz" -C "$(dirname "$bin")" dfetch

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Recurse -Path dist -Filter dfetch.exe | Select-Object -First 1
          if (-not $bin) { Write-Error "no dfetch.exe in dist/"; exit 1 }
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path $bin.FullName -DestinationPath "release/dfetch_$(go env GOOS)_$(go env GOARCH).zip"

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.os }}
          path: release/*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect archives and checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.txt
          ls -la

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --generate-notes --repo "${GITHUB_REPOSITORY}"
