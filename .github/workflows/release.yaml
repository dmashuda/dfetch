name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # cgo (mattn/go-sqlite3) can't be cleanly cross-compiled, so build each OS on
  # its native runner. ubuntu-latest -> linux/amd64, macos-latest -> darwin/arm64,
  # windows-latest -> windows/amd64. Additional arches can be added with more
  # runners (e.g. linux/arm64) later.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build native target
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: build --single-target --clean

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os }}
          path: dist/**/dfetch*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package archives and checksums
        run: |
          set -euo pipefail
          mkdir -p release
          # Each downloaded binary lives under artifacts/binary-<os>/<build-id>_<goos>_<goarch>.../dfetch[.exe]
          while IFS= read -r bin; do
            dir=$(dirname "$bin")
            target=$(basename "$dir")            # e.g. dfetch_linux_amd64_v1
            name=${target#dfetch_}               # e.g. linux_amd64_v1
            if [[ "$bin" == *.exe ]]; then
              zip -j "release/dfetch_${name}.zip" "$bin"
            else
              tar czf "release/dfetch_${name}.tar.gz" -C "$dir" "$(basename "$bin")"
            fi
          done < <(find artifacts -type f -name 'dfetch*')
          cd release
          sha256sum * > checksums.txt
          ls -la

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --generate-notes --repo "${GITHUB_REPOSITORY}"
