# Nix packaging check, split out of ci.yaml and path-filtered: `nix build`
# compiles the same Go code build-and-test already covers, so running it on
# every push only guards the packaging itself (flake eval, toolchain
# resolution, vendorHash drift) — and those inputs only change with the files
# below. This keeps the ~3-minute uncached Nix build off the critical path of
# ordinary code pushes. It is not a required status check, so PRs that don't
# touch these paths merge without it.
name: Nix

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/nix.yaml"
  pull_request:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "nix/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/nix.yaml"

permissions:
  contents: read

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: dfetch
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          # Fork PRs run without repo secrets, so authToken is empty and pushes
          # are skipped automatically — they still read from the cache. The cache
          # is populated on push to main, where the secret is available.
          skipPush: ${{ github.ref != 'refs/heads/main' }}
      - name: Nix build
        run: nix build .#
      - name: Nix file formatting
        run: find . -type f -name '*.nix' | xargs nix develop -c nixfmt --strict --check
