# Runs on dependabot PRs, since dependabot cannot update `vendorHash` in `flake.nix`;
# we do it manually instead and update the dependabot PR.
name: Update Nix vendor hash
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: write
concurrency:
  group: update-nix-vendor-hash-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  update-vendor-hash:
    if: github.actor == 'dependabot[bot]' && startsWith(github.head_ref, 'dependabot/go_modules/')
    runs-on: ubuntu-latest
    steps:
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.head_ref }}
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
      - name: Update vendorHash
        run: nix develop -c nix-update default --flake --version=skip
      - name: Commit hash update
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore(nix): Update Nix vendor hash"
          git push
