# dfetch config for the dfetch repo itself.
#
# The github, jaeger, and datagov connectors are built in and need no `sources`
# entry. github talks to api.github.com (set GITHUB_TOKEN in the environment);
# jaeger defaults to the local instance from `docker compose up -d` (UI :16686).
# To point either at a different host, add a `sources` entry — e.g.:
#
# sources:
#   - name: jaeger
#     type: jaeger
#     params:
#       base_url: http://jaeger.example.com:16686
#
# To authenticate GitHub with the gh CLI instead of environment variables:
# sources:
#   - name: github
#     type: github
#     params:
#       token_command: ["gh", "auth", "token"]
#
# slack is built in too. Authenticate with $SLACK_TOKEN (a bare token, sent as
# "Bearer <token>"), or run a command whose stdout is the full Authorization
# header, used verbatim:
# sources:
#   - name: slack
#     type: slack
#     params:
#       auth_header_command: ["cat", "/run/secrets/slack-auth-header"]
#
# New Relic (NerdGraph) is config-only: it needs your account id, plus a User
# API key (NOT the ingest license key) in $NEW_RELIC_API_KEY. Query NRDB event
# types (newrelic.Transaction, newrelic.Span, ...) and the curated tables
# (accounts, entities, alert_policies, alert_conditions, issues, incidents):
# sources:
#   - name: newrelic
#     type: newrelic
#     params:
#       account_id: 1234567
#

queries:
  # Latest error spans for a service (defaults to a 1-hour window in Jaeger).
  # e.g. dfetch run jaeger-errors dfetch
  - name: jaeger-errors
    description: Latest error spans for a service
    params: [service]
    columns: [start_time, operation_name, status_message, trace_id]
    sql: |
      SELECT start_time, service_name, operation_name, status_message,
             duration_ms, status_code, trace_id
      FROM jaeger.spans
      WHERE service_name = :service AND status_code = 'error'
      ORDER BY start_time DESC
      LIMIT 50

  # Every span in a trace, in start order. SELECT * so --all-columns exposes every
  # span property, including the `attributes` (tags) JSON column; the default view
  # narrows to the readable columns below.
  # e.g. dfetch run trace-spans 4f8e2a1b...   (add --all-columns for tags)
  - name: trace-spans
    description: All spans for a trace
    params: [trace_id]
    columns:
      [start_time, service_name, operation_name, duration_ms, status_code]
    sql: |
      SELECT *
      FROM jaeger.spans
      WHERE trace_id = :trace_id
      ORDER BY start_time

  # Open, non-draft PRs on this repo (there is no reviewer field upstream, so
  # "to review" == open and ready). e.g. dfetch run prs-to-review
  - name: prs-to-review
    description: Open, ready-for-review PRs on dmashuda/dfetch
    params: []
    columns: [number, title, user_login, created_at]
    sql: |
      SELECT number, title, user_login, draft, created_at, updated_at, html_url
      FROM github.pulls
      WHERE owner = 'dmashuda' AND repo = 'dfetch'
        AND state = 'open' AND draft = 0
      ORDER BY created_at

  # CI run statuses for a branch (pass the PR's head branch).
  # e.g. dfetch run pr-checks feat/per-project-config-saved-queries
  - name: pr-checks
    description: Workflow run statuses for a branch
    params: [branch]
    columns: [name, status, conclusion, run_started_at]
    sql: |
      SELECT name, head_branch, status, conclusion, run_started_at,
             updated_at, html_url
      FROM github.workflow_runs
      WHERE owner = 'dmashuda' AND repo = 'dfetch'
        AND head_branch = :branch
      ORDER BY created_at DESC

  # Recent workflow runs with computed wall-clock duration (seconds).
  # e.g. dfetch run workflow-times
  - name: workflow-times
    description: Recent workflow runs with computed durations
    params: []
    columns: [name, head_branch, conclusion, duration_s, run_started_at]
    sql: |
      SELECT name, head_branch, event, conclusion, run_started_at,
             ROUND((julianday(updated_at) - julianday(run_started_at)) * 86400, 1) AS duration_s,
             html_url
      FROM github.workflow_runs
      WHERE owner = 'dmashuda' AND repo = 'dfetch'
      ORDER BY created_at DESC
      LIMIT 50

  # Latest spans for a service in New Relic (defaults to the last hour; add a
  # timestamp >= <epoch_ms> filter for more history). SELECT * so --all-columns
  # exposes every span attribute. e.g. dfetch run nr-recent-spans dfetch
  - name: nr-recent-spans
    description: Latest New Relic spans for a service
    params: [service]
    columns: [timestamp, name, duration.ms, trace.id]
    sql: |
      SELECT *
      FROM newrelic.Span
      WHERE `service.name` = :service
      ORDER BY timestamp DESC
      LIMIT 50

  # Slowest spans for a service, sorted locally (duration ordering can't ride
  # the NRQL push-down; the fetch is capped at 5000 events in the window).
  # e.g. dfetch run nr-slow-spans dfetch
  - name: nr-slow-spans
    description: Slowest New Relic spans for a service
    params: [service]
    columns: [timestamp, name, duration.ms, trace.id]
    sql: |
      SELECT *
      FROM newrelic.Span
      WHERE `service.name` = :service
      ORDER BY `duration.ms` DESC
      LIMIT 25

  # Every New Relic span in a trace, in start order — the NR twin of
  # trace-spans. e.g. dfetch run nr-trace 845219c3627de5fa...
  - name: nr-trace
    description: All New Relic spans for a trace
    params: [trace_id]
    columns: [timestamp, name, duration.ms, service.name]
    sql: |
      SELECT *
      FROM newrelic.Span
      WHERE `trace.id` = :trace_id
      ORDER BY timestamp

  # Alert issues that aren't closed (what's firing right now).
  # e.g. dfetch run nr-open-issues
  - name: nr-open-issues
    description: Open New Relic alert issues
    params: []
    columns: [title, priority, state, entity_names]
    sql: |
      SELECT title, priority, state, created_at, entity_names, entity_types
      FROM newrelic.issues
      WHERE state != 'CLOSED'
      ORDER BY created_at DESC

  # Everything New Relic monitors in the account, by name.
  # e.g. dfetch run nr-entities
  - name: nr-entities
    description: New Relic entity inventory
    params: []
    columns: [name, domain, type, alert_severity]
    sql: |
      SELECT name, domain, type, entity_type, alert_severity, reporting, guid
      FROM newrelic.entities
      ORDER BY name
