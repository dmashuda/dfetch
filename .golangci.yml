version: "2"

linters:
  default: standard
  enable:
    - errname
    - errorlint
    - gocritic
    - misspell
    - prealloc
    - unconvert
    - unparam
  exclusions:
    generated: lax
    paths:
      - internal/sqlparse/gen

formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - internal/sqlparse/gen

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
