# OpenTelemetry Collector config for local dev (see docker-compose.yml).
# dfetch exports OTLP to the collector (localhost:4318); the collector batches
# and forwards to Jaeger over the compose network. Insert processors/exporters
# here to shape the pipeline without touching dfetch.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  otlp/jaeger:
    # Jaeger v2 speaks OTLP natively; "jaeger" resolves on the compose network.
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
